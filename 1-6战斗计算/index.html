<body>
  <div id="app">
    <header class="panel-header">
      <h1>咒术回战 · 状态监控</h1>
      <div class="header-center">
        <span>回合: <span class="turn-counter" id="turn-counter">1</span></span>
      </div>
      <button class="edit-toggle" id="edit-toggle" type="button">编辑模式 🔒</button>
    </header>
    <main class="panel-main">
      <section class="side-column" id="player-side">
        <div class="side-header">Player Side</div>
      </section>
      <section class="side-column" id="enemy-side">
        <div class="side-header">Enemy Side</div>
      </section>
    </main>
    <footer class="env-panel">
      <span class="env-label">当前环境:</span>
      <span class="env-value" id="env-value">一般战场</span>
    </footer>
    <div class="save-bar" id="save-bar">
      <span class="save-bar-text">存在未保存的修改</span>
      <button class="save-btn" id="save-btn" type="button">保存</button>
      <button class="cancel-btn" id="cancel-btn" type="button">取消</button>
    </div>
  </div>
</body>
